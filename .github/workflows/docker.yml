name: Build and Push Docker (fork)
on:
  release:
    # "published" fires for both direct publishes and draft->publish;
    # "created" alone missed draft releases and both together double-build.
    types:
      - published
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Github Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        run: |
          set -euo pipefail
          tags="ghcr.io/${{ github.repository_owner }}/karakeep:latest"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            tags="ghcr.io/${{ github.repository_owner }}/karakeep:${{ github.event.release.tag_name }},${tags}"
          fi
          echo "all=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push karakeep (aio)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          build-args: SERVER_VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || 'nightly' }}
          file: docker/Dockerfile
          target: aio
          # amd64 only: the arm64 half ran under QEMU and pushed builds past 70 min.
          # Deployment target (LXC 113) is x86; use native arm runners if arm64 is ever needed.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.all }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
